name: Tests

on:
  push:
  pull_request:

jobs:
  unit_tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]

    steps:
      - name: Checkout leap-c
        uses: actions/checkout@v7
        with:
          path: ${{github.workspace}}/leap_c
          submodules: "recursive"

      - name: Setup leap-c environment
        uses: ./leap_c/.github/actions/setup-leap-c
        with:
          python-version: ${{ matrix.python-version }}

      - name: Run tests
        working-directory: ${{github.workspace}}/leap_c
        run: |
          pytest tests/leap_c/ -v --cov=leap_c --cov-report=xml:coverage-unit.xml --cov-report=term

      - name: Upload coverage to Codecov
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
        if: env.CODECOV_TOKEN != ''
        uses: codecov/codecov-action@v7
        with:
          token: ${{ env.CODECOV_TOKEN }}
          name: unit-tests-${{ matrix.python-version }}
          flags: unit-tests
          verbose: true

  integration_tests_placeholders:
    name: Integration Tests (${{ matrix.env }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        env: [cartpole, chain, pointmass]
    steps:
      - name: Integration tests moved downstream
        run: |
          echo "The ${{ matrix.env }} integration tests were removed from core CI."
          echo "This placeholder keeps existing branch protection checks green until they are updated."
