name: Docker

on:
  push:
    branches: [feat/uv_docker]
    tags: ["v*"]
  schedule:
    # Nightly build at 02:00 UTC — catches upstream acados/PyTorch changes
    - cron: "0 2 * * *"
  workflow_dispatch:

env:
  REGISTRY: ghcr.io

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: cpu
            platforms: linux/amd64,linux/arm64
          - target: gpu
            platforms: linux/amd64
          - target: notebook
            platforms: linux/amd64,linux/arm64
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate tags
        id: tags
        shell: bash
        run: |
          REPO_LOWER=$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')
          IMAGE="ghcr.io/${REPO_LOWER}"
          TARGET="${{ matrix.target }}"
          TAGS="${IMAGE}:${TARGET}"

          # 'latest' and bare version tags only on notebook (the default demo target)
          if [ "$TARGET" = "notebook" ]; then
            TAGS="${TAGS},${IMAGE}:latest"
          fi

          # Semver release tags
          if [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            VERSION="${GITHUB_REF#refs/tags/v}"
            TAGS="${TAGS},${IMAGE}:v${VERSION}-${TARGET}"
            if [ "$TARGET" = "notebook" ]; then
              TAGS="${TAGS},${IMAGE}:v${VERSION}"
            fi
          fi

          echo "tags=${TAGS}" >> "$GITHUB_OUTPUT"

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          target: ${{ matrix.target }}
          platforms: ${{ matrix.platforms }}
          push: true
          tags: ${{ steps.tags.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
