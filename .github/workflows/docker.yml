name: Docker

on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      target:
        description: "Which target to build"
        type: choice
        options: [notebook, cpu, all]
        default: notebook

env:
  REGISTRY: ghcr.io

jobs:
  build:
    name: Build ${{ matrix.target }} (${{ matrix.arch }})
    runs-on: ${{ matrix.runner }}
    if: >-
      github.event_name == 'push' ||
      github.event.inputs.target == matrix.target ||
      github.event.inputs.target == 'all'
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: notebook
            arch: amd64
            platform: linux/amd64
            runner: ubuntu-latest
          - target: notebook
            arch: arm64
            platform: linux/arm64
            runner: ubuntu-24.04-arm
          - target: cpu
            arch: amd64
            platform: linux/amd64
            runner: ubuntu-latest
          - target: cpu
            arch: arm64
            platform: linux/arm64
            runner: ubuntu-24.04-arm
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Repository name (lowercase)
        id: repo
        shell: bash
        run: echo "name=$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_OUTPUT"

      - name: Build and push arch image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          target: ${{ matrix.target }}
          platforms: ${{ matrix.platform }}
          push: true
          tags: ${{ env.REGISTRY }}/${{ steps.repo.outputs.name }}:${{ matrix.target }}-${{ matrix.arch }}
          cache-from: type=registry,ref=${{ env.REGISTRY }}/${{ steps.repo.outputs.name }}:buildcache-${{ matrix.target }}-${{ matrix.arch }}
          cache-to: type=registry,ref=${{ env.REGISTRY }}/${{ steps.repo.outputs.name }}:buildcache-${{ matrix.target }}-${{ matrix.arch }},mode=max

  manifest:
    name: Create manifests
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        target: [notebook, cpu]
    if: >-
      github.event_name == 'push' ||
      github.event.inputs.target == matrix.target ||
      github.event.inputs.target == 'all'
    steps:
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Repository name (lowercase)
        id: repo
        shell: bash
        run: echo "name=$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_OUTPUT"

      - name: Create multi-arch manifest
        shell: bash
        run: |
          IMAGE="${{ env.REGISTRY }}/${{ steps.repo.outputs.name }}"
          TARGET="${{ matrix.target }}"
          TAGS="-t ${IMAGE}:${TARGET}"

          if [ "$TARGET" = "notebook" ]; then
            TAGS="${TAGS} -t ${IMAGE}:latest"
          fi

          if [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            VERSION="${GITHUB_REF#refs/tags/v}"
            TAGS="${TAGS} -t ${IMAGE}:v${VERSION}-${TARGET}"
            if [ "$TARGET" = "notebook" ]; then
              TAGS="${TAGS} -t ${IMAGE}:v${VERSION}"
            fi
          fi

          docker buildx imagetools create \
            ${TAGS} \
            "${IMAGE}:${TARGET}-amd64" \
            "${IMAGE}:${TARGET}-arm64"
