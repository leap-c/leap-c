name: Docker

on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      target:
        description: "Which target to build"
        type: choice
        options: [notebook, cpu, all]
        default: notebook

env:
  REGISTRY: ghcr.io

jobs:
  notebook-build:
    name: Notebook (${{ matrix.arch }})
    runs-on: ${{ matrix.runner }}
    if: github.event_name == 'push' || github.event.inputs.target == 'notebook' || github.event.inputs.target == 'all'
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            platform: linux/amd64
            runner: ubuntu-latest
          - arch: arm64
            platform: linux/arm64
            runner: ubuntu-24.04-arm
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          submodules: recursive

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to Container Registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Repository name (lowercase)
        id: repo
        shell: bash
        run: echo "name=$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_OUTPUT"

      - name: Build and push arch image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./Dockerfile
          target: notebook
          platforms: ${{ matrix.platform }}
          push: true
          tags: ${{ env.REGISTRY }}/${{ steps.repo.outputs.name }}:notebook-${{ matrix.arch }}
          cache-from: type=registry,ref=${{ env.REGISTRY }}/${{ steps.repo.outputs.name }}:buildcache-${{ matrix.arch }}
          cache-to: type=registry,ref=${{ env.REGISTRY }}/${{ steps.repo.outputs.name }}:buildcache-${{ matrix.arch }},mode=max

  notebook-manifest:
    name: Notebook manifest
    needs: notebook-build
    runs-on: ubuntu-latest
    if: github.event_name == 'push' || github.event.inputs.target == 'notebook' || github.event.inputs.target == 'all'
    permissions:
      contents: read
      packages: write
    steps:
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to Container Registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Repository name (lowercase)
        id: repo
        shell: bash
        run: echo "name=$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_OUTPUT"

      - name: Create multi-arch manifest
        shell: bash
        run: |
          IMAGE="${{ env.REGISTRY }}/${{ steps.repo.outputs.name }}"
          TAGS="-t ${IMAGE}:notebook -t ${IMAGE}:latest"

          if [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            VERSION="${GITHUB_REF#refs/tags/v}"
            TAGS="${TAGS} -t ${IMAGE}:v${VERSION} -t ${IMAGE}:v${VERSION}-notebook"
          fi

          docker buildx imagetools create \
            ${TAGS} \
            "${IMAGE}:notebook-amd64" \
            "${IMAGE}:notebook-arm64"

  cpu-build:
    name: CPU
    runs-on: ${{ matrix.runner }}
    if: github.event_name == 'push' || github.event.inputs.target == 'cpu' || github.event.inputs.target == 'all'
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            platform: linux/amd64
            runner: ubuntu-latest
          - arch: arm64
            platform: linux/arm64
            runner: ubuntu-24.04-arm
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          submodules: recursive

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to Container Registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Repository name (lowercase)
        id: repo
        shell: bash
        run: echo "name=$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_OUTPUT"

      - name: Build and push arch image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./Dockerfile
          target: cpu
          platforms: ${{ matrix.platform }}
          push: true
          tags: ${{ env.REGISTRY }}/${{ steps.repo.outputs.name }}:cpu-${{ matrix.arch }}
          cache-from: type=registry,ref=${{ env.REGISTRY }}/${{ steps.repo.outputs.name }}:buildcache-${{ matrix.arch }}
          cache-to: type=registry,ref=${{ env.REGISTRY }}/${{ steps.repo.outputs.name }}:buildcache-${{ matrix.arch }},mode=max

  cpu-manifest:
    name: CPU manifest
    needs: cpu-build
    runs-on: ubuntu-latest
    if: github.event_name == 'push' || github.event.inputs.target == 'cpu' || github.event.inputs.target == 'all'
    permissions:
      contents: read
      packages: write
    steps:
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to Container Registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Repository name (lowercase)
        id: repo
        shell: bash
        run: echo "name=$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_OUTPUT"

      - name: Create multi-arch manifest
        shell: bash
        run: |
          IMAGE="${{ env.REGISTRY }}/${{ steps.repo.outputs.name }}"
          TAGS="-t ${IMAGE}:cpu"

          if [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            VERSION="${GITHUB_REF#refs/tags/v}"
            TAGS="${TAGS} -t ${IMAGE}:v${VERSION}-cpu"
          fi

          docker buildx imagetools create \
            ${TAGS} \
            "${IMAGE}:cpu-amd64" \
            "${IMAGE}:cpu-arm64"
