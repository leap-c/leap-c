name: "Builds acados"
description: "Builds acados from source and caches the binaries for future runs."
runs:
  using: "composite"
  steps:
    - name: Generate acados Submodule Fingerprint
      id: acados-hash
      shell: bash
      run: |
        cd ${{ github.workspace }}/leap_c/external/acados
        echo "hash=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

    - name: Cache acados Binaries
      id: cache-acados
      uses: actions/cache@v4
      with:
        path: |
          ${{ github.workspace }}/leap_c/external/acados/build
          ${{ github.workspace }}/leap_c/external/acados/lib
          ${{ github.workspace }}/leap_c/external/acados/include
        key: ${{ runner.os }}-acados-${{ steps.acados-hash.outputs.hash }}

    - name: Compile acados Manually
      if: steps.cache-acados.outputs.cache-hit != 'true'
      working-directory: ${{ github.workspace }}/leap_c/external/acados
      shell: bash
      run: |
        mkdir -p build
        cd build
        cmake -DACADOS_WITH_OPENMP=ON -DACADOS_NUM_THREADS=1 ..
        make install -j4
